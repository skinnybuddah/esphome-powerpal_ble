esphome:
  name: powerpal-gateway
  friendly_name: Powerpal Gateway
  on_boot:
    priority: -100
    then:
      - script.execute: sync_powerpal_time

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "YOUR_API_KEY"

ota:
  password: "YOUR_OTA_PASSWORD"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  ap:
    ssid: "Powerpal Fallback Hotspot"
    password: !secret wifi_password

web_server:
  port: 80

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

external_components:
  - source:
      type: git
      url: https://github.com/skinnybuddah/esphome-powerpal_ble.git
      ref: main
    components: [ powerpal_ble ]

time:
  - platform: homeassistant
    id: homeassistant_time

ble_client:
  - mac_address: DD:09:5F:39:46:8D
    id: powerpal
    auto_connect: true

sensor:
  - platform: powerpal_ble
    id: powerpal_ble_sensor
    ble_client_id: powerpal

    power:
      name: "Powerpal Power"

    battery_level:
      name: "Powerpal Battery"

    daily_energy:
      name: "Powerpal Daily Energy"
      unit_of_measurement: kWh
      device_class: energy
      state_class: total_increasing

    energy:
      name: "Powerpal Total Energy"
      unit_of_measurement: kWh
      device_class: energy
      state_class: total_increasing

    pulses:
      name: "Powerpal Pulses"

    watt_hours:
      name: "Powerpal Watt Hours"

    timestamp:
      name: "Powerpal Timestamp"

    cost:
      name: "Powerpal Cost"

    pairing_code: 407373
    notification_interval: 1
    pulses_per_kwh: 1000
    time_id: homeassistant_time
    cost_per_kwh: 0.20

text_sensor:
  - platform: template
    name: "Powerpal API Key"
    id: powerpal_api_key

button:
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Powerpal: Set Device Time"
    on_press:
      - ble_client.ble_write:
          id: powerpal
          service_uuid: '59DAABCD-12F4-25A6-7D4F-55961DCE4205'
          characteristic_uuid: '59DA0004-12F4-25A6-7D4F-55961DCE4205'
          value: !lambda |-
            uint32_t t = id(homeassistant_time).now().timestamp;
            return std::vector<uint8_t>{
              (uint8_t)(t),
              (uint8_t)(t >> 8),
              (uint8_t)(t >> 16),
              (uint8_t)(t >> 24)
            };

  - platform: template
    name: "Retrieve API Key"
    on_press:
      then:
        - lambda: |-
            std::string api_key = id(powerpal_ble_sensor).get_apikey();
            id(powerpal_api_key).publish_state(api_key);

interval:
  - interval: 6h
    then:
      - script.execute: sync_powerpal_time
