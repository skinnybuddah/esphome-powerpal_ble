esphome:
  name: powerpal-gateway
  friendly_name: Powerpal Gateway
  on_boot:
    priority: -100
    then:
      - script.execute: sync_powerpal_time

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "YOUR_API_KEY"

ota:
  password: "YOUR_OTA_PASSWORD"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  ap:
    ssid: "Powerpal Fallback Hotspot"
    password: !secret wifi_password

web_server:
  port: 80

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

external_components:
  - source:
      type: git
      url: https://github.com/gurrier/esphome-powerpal_ble.git
      ref: "1.2"   # or “main” for bleeding edge
    components: [ powerpal_ble ]

time:
  - platform: homeassistant
    id: homeassistant_time

ble_client:
  - mac_address: DD:09:5F:39:46:8D
    id: powerpal
    auto_connect: true

sensor:
  - platform: powerpal_ble
    id: powerpal_ble_sensor
    ble_client_id: powerpal
    power:
      name: "Powerpal Power"

    battery_level:
      name: "Powerpal Battery"

    daily_energy:
      name: "Powerpal Daily Energy"
      unit_of_measurement: kWh
      device_class: energy
      state_class: total_increasing

    energy:
      name: "Powerpal Total Energy"
      unit_of_measurement: kWh
      device_class: energy
      state_class: total_increasing

    pulses:
      name: "Powerpal Pulses"

    watt_hours:
      name: "Powerpal Watt Hours"

    timestamp:
      name: "Powerpal Timestamp"

    cost:
      name: "Powerpal Cost"
    pairing_code: 123456  # << EDIT HERE
    notification_interval: 1 # In seconds
    pulses_per_kwh: 1000
    time_id: homeassistant_time

logger:
#  level: DEBUG
#  logs:
#    powerpal_ble: DEBUG

api:
  encryption:
    key: !secret esphome_api_encryption_key

ota:
  platform: esphome
  password: "XXXXXXXXXXXXXXXXXXXXX" # << EDIT HERE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Powerpal Fallback Hotspot"
    password: "XXXXXXXX" # << EDIT HERE

web_server:
  port: 80
  auth:
    username: !secret esphome_web_username
    password: !secret esphome_web_password
